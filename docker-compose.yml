services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wcpredictor
      POSTGRES_PASSWORD: wcpredictor
      POSTGRES_DB: wcpredictor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wcpredictor"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://wcpredictor:wcpredictor@db:5432/wcpredictor?schema=public"
      # Secrets are read from your local (git-ignored) .env file via interpolation,
      # so real values never get committed. Defaults below are safe placeholders.
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-dev-secret-change-me-in-production}"
      NEXTAUTH_URL: "http://localhost:3000"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@worldcup.local}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin123}"
      ADMIN_NAME: "${ADMIN_NAME:-Tournament Director}"
    ports:
      - "3000:3000"
    # On first boot, push the schema and seed, then start the server.
    command: sh -c "npx prisma db push --skip-generate && npx tsx prisma/seed.ts && node server.js"

volumes:
  pgdata:
